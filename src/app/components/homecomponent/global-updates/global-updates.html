<section class="bg-slate-50/50 py-16">
  <div class="container mx-auto px-4">
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-stretch">
      
      <div class="lg:col-span-7 flex">
        @if (golbaUpdate()[0]; as featured) {
          <div class="group cursor-pointer bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-500 border border-slate-100 flex flex-col w-full">
            <div class="relative overflow-hidden aspect-video lg:aspect-auto lg:flex-grow">
              <img [src]="featured.img" [alt]="featured.title" 
                   class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000">
              <div class="absolute top-6 left-6 bg-blue-700 text-white px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest shadow-lg">
                Featured
              </div>
            </div>
            
            <div class="p-8 bg-white">
              <h2 class="text-2xl md:text-3xl font-black text-slate-900 mb-4 leading-tight group-hover:text-blue-800 transition-colors">
                {{ featured.title }}
              </h2>
              <div class="w-16 h-1 bg-blue-700 mb-4 rounded-full group-hover:w-24 transition-all duration-500"></div>
              <p class="text-slate-600 leading-relaxed text-sm md:text-base font-medium line-clamp-3">
                {{ featured.desc }}
              </p>
            </div>
          </div>
        }
      </div>

      <div class="lg:col-span-5 flex flex-col gap-4">
        @for (item of golbaUpdate(); track item.title; let i = $index) {
          @if (i > 0) {
            <div class="flex flex-1 flex-col sm:flex-row gap-4 group cursor-pointer bg-white p-3 rounded-2xl border border-slate-50 hover:border-blue-200 hover:shadow-md transition-all duration-300">
              
              <div class="w-full sm:w-[350px] h-[100px] sm:h-full overflow-hidden flex-shrink-0 rounded-xl shadow-inner">
                <img [src]="item.img" [alt]="item.title" 
                     class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
              </div>
              
              <div class="flex flex-col justify-center py-1">
                <span class="text-[14px] font-black text-blue-600 uppercase tracking-widest mb-1 block">Global News</span>
                <h3 class="text-base font-extrabold text-slate-900 mb-1 leading-tight group-hover:text-blue-700 transition-colors line-clamp-2">
                  {{ item.title }}
                </h3>
                <p class="text-slate-500 text-[11px] md:text-xs line-clamp-2 leading-snug">
                  {{ item.desc }}
                </p>
              </div>
            </div>
          }
        }
      </div>

    </div>
  </div>
</section>
